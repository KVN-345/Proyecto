
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Talleres</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container mt-5">
    <h1 class="text-primary fw-bold">🌟 Talleres de Formación Profesional</h1>
    <table class="table table-striped table-hover mt-4">
      <thead class="table-dark">
        <tr>
          <th>Nombre</th>
          <th>Fecha</th>
          <th>Hora</th>
          <th>Lugar</th>
          <th>Categoría</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Curso de Python</td>
          <td>25/04/2026</td>
          <td>10:00 AM</td>
          <td>Aula 101</td>
          <td>Tecnología</td>
          <td>
            <button class="btn btn-success btn-sm">Inscribirse</button>
            <button class="btn btn-warning btn-sm">Editar</button>
            <button class="btn btn-danger btn-sm">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</body>
</html>
