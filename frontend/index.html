<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Talleres</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Gestión de Talleres</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
              data-bs-target="#navbarNav" aria-controls="navbarNav" 
              aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="#">Talleres</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Estudiante</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Administración</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Vista Talleres -->
  <div id="talleresView" class="container mt-4">
    <h1 class="text-center">Lista de Talleres</h1>
    <div id="workshopsList" class="row mt-4"></div>
  </div>

  <!-- Vista Estudiante -->
  <div id="studentView" class="container mt-4 d-none">
    <h2>Vista Estudiante</h2>
    <form id="studentForm">
      <input type="text" class="form-control mb-2" placeholder="Nombre del estudiante" id="studentName">
      <input type="number" class="form-control mb-2" placeholder="ID del taller" id="workshopId">
      <button type="submit" class="btn btn-success">Inscribirse</button>
    </form>
    <div id="studentMessage" class="mt-3"></div>
  </div>

  <!-- Vista Administración -->
  <div id="adminView" class="container mt-4 d-none">
    <h2>Administración</h2>
    <form id="adminForm">
      <input type="text" class="form-control mb-2" placeholder="Nombre del taller" id="workshopName">
      <input type="number" class="form-control mb-2" placeholder="Cupos" id="workshopSlots">
      <button type="submit" class="btn btn-primary">Crear Taller</button>
    </form>
    <div id="adminMessage" class="mt-3"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
